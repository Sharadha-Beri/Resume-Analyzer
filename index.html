<!DOCTYPE html>
<html>
<head>
    <title>Online Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Online Resume Analyzer</h1>

    <form id="resumeForm">
        <input type="text" id="name" placeholder="Enter Your Name" required>
        <input type="email" id="email" placeholder="Enter Your Email" required>
        <textarea id="resumeText" placeholder="Paste Your Resume Content Here" required></textarea>
        <button type="submit">Analyze Resume</button>
    </form>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
